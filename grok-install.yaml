# grok-install.yaml – hermes-telegram-dashboard (v2.12)
# Telegram dashboard with full Phase 10 + Phase 11 Passive Growth Engine support
version: "2.12"
name: "Hermes Telegram Dashboard"
description: "AI-powered Telegram dashboard for community management and real-time updates from connected agents."
repository: "https://github.com/AgentMindCloud/hermes-telegram-dashboard"
category: "telegram"
tags: ["dashboard", "community", "telegram", "orchestration", "grok"]
featured: true
ecosystem: ["grok", "x", "telegram"]

# === PHASE 10 NEW BLOCKS ===
# Native X Agent Runtime (Goal 1)
x_native_runtime:
  type: "custom"
  permissions: []
  grok_orchestrator: true
  one_click_x_deploy: true

# Grok Intelligence Layer (Goal 2)
intelligence_layer:
  function_calling: true
  real_time_tools: true
  multi_agent_swarm: true
  grok_coordinates: true
  ai_suggested_teams: true

# Advanced Trust & Reputation (Goal 3)
reputation:
  public_score: true
  verified_by_grok: true
  scan_history: true
  automated_recommendations: true

# Safety & Verification 2.0 (from Phase 9 – kept unchanged)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

# Orchestration & Triggers (from previous phases – kept and extended)
orchestration:
  enabled: true
  role: "target"
  can_trigger: []
  can_be_triggered_by: ["twitter-reply-bot"]
  visual_builder: true
  ai_suggested_patterns: true
  triggers:
    - event: "mention"
      action: "update_dashboard"
      target_agents: ["hermes"]

llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

environment:
  variables:
    GROK_API_KEY:
      description: "Your Grok / xAI API key"
      required: true
      secret: true
    TELEGRAM_TOKEN:
      description: "Your Telegram bot token"
      required: true
      secret: true

deployment:
  preferred: ["railway", "docker"]
  targets:
    - railway
    - docker

# === PHASE 11 NEW BLOCK – Passive Growth Engine ===
promotion:
  auto_welcome: true
  auto_share: true
  weekly_highlight: true
  featured: true
  builder_credits: "@JanSol0s"
  support_link: "https://github.com/sponsors/JanSol0s"

# Credits (strongly recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.12"
  message: "Powered by grok-install open standard"
