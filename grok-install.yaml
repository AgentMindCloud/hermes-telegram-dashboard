version: "2.9"
name: "Hermes Telegram Dashboard"
description: "AI-powered community management dashboard"
repository: "https://github.com/AgentMindCloud/hermes-telegram-dashboard"
category: "telegram"
tags: ["ai", "dashboard", "community", "orchestration"]
featured: true
ecosystem: ["grok", "x", "telegram"]

llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

# Analytics & Insights
analytics:
  enabled: true
  public_insights: true

# Advanced Discovery
discovery:
  verified_orchestration: true

# Multi-Agent Orchestration (Phase 7 + Phase 8)
orchestration:
  enabled: true
  role: "dashboard"
  can_trigger: ["discord"]
  can_be_triggered_by: ["twitter"]
  triggers:
    - event: "mention"          # triggered by Twitter Reply Bot
      action: "update_dashboard"
      target_agents: ["hermes"]
    - event: "new_member"
      action: "send_welcome"
  safety:
    permission_check: true
    approval_required: true
    verified_orchestration: true

# Environment variables (Grok asks privately)
deploy:
  env:
    TELEGRAM_TOKEN: "Ask the user for their Telegram bot token"
    GROK_API_KEY: "Ask the user for their Grok API key"

# Deployment targets
preferred_deploy: ["railway", "render", "fly", "local"]
mode: "simple"

# Credits (strongly recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.9"
  message: "Powered by grok-install open standard"
